<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>NTEPedia - Guide FR Neverness to Everness</title>

  <link rel="stylesheet" href="style.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800&family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">

  <link rel="icon" type="image/png" href="annex/favicon.png">
  <link rel="shortcut icon" href="annex/favicon.png">
  <link rel="apple-touch-icon" href="annex/favicon.png">
</head>

<body>

  <section class="hero">
    <div class="container">
      <img
        src="annex/ntepedia-banner2.png"
        alt="NTEPedia - Guide FR Neverness to Everness"
        class="hero-banner"
      >
    </div>
  </section>

  <section class="quick-access">
    <div class="container">
      <div class="quick-grid">
        <a href="index.html" class="quick-card">Accueil</a>
        <a href="guides.html" class="quick-card">Guides</a>            
      </div>
    </div>
  </section>

<section id="personnages" class="section">
  <div class="container">
    <img
      src="annex/espers-banner.png"
      alt="NTEPedia - Espers"
      class="section-banner"
    >

    <div id="espers-grid" class="espers-grid"></div>
    <div class="esper-filters">
      <button class="filter-btn active" data-filter-type="all" data-filter-value="all">Tous</button>
    
      <button class="filter-btn" data-filter-type="rarete" data-filter-value="S">
        <img src="annex/s_rarity.png" alt="S">
      </button>
    
      <button class="filter-btn" data-filter-type="rarete" data-filter-value="A">
        <img src="annex/a_rarity.png" alt="A">
      </button>
    
      <button class="filter-btn" data-filter-type="attribut" data-filter-value="Anima">
        <img src="annex/anima.png" alt="Anima">
      </button>
    
      <button class="filter-btn" data-filter-type="attribut" data-filter-value="Cosmos">
        <img src="annex/cosmos.png" alt="Cosmos">
      </button>
    
      <button class="filter-btn" data-filter-type="attribut" data-filter-value="Psyché">
        <img src="annex/psyché.png" alt="Psyché">
      </button>
    
      <button class="filter-btn" data-filter-type="attribut" data-filter-value="Incantation">
        <img src="annex/incantation.png" alt="Incantation">
      </button>
    
      <button class="filter-btn" data-filter-type="attribut" data-filter-value="Lakshana">
        <img src="annex/lakshana.png" alt="Lakshana">
      </button>
    
      <button class="filter-btn" data-filter-type="attribut" data-filter-value="Chaos">
        <img src="annex/chaos.png" alt="Chaos">
      </button>
    </div>

<div id="espers-grid" class="espers-grid"></div>
  </div>
</section>

<footer class="site-footer">
  <div class="container">
    <p>
      NTEPedia est un site communautaire non officiel dédié à Neverness to Everness.
      Neverness to Everness™, ses personnages, logos et ressources visuelles
      appartiennent à Perfect World Games et Hotta Studio.
    </p>
  </div>
</footer>

<script>
  let allEspers = [];
  let activeFilter = {
    type: "all",
    value: "all"
  };

  function normalizeIconName(value) {
    return value
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "");
  }

  function renderEspers() {
    const grid = document.getElementById("espers-grid");
    grid.innerHTML = "";

    const filteredEspers = activeFilter.type === "all"
      ? allEspers
      : allEspers.filter(esper => esper[activeFilter.type] === activeFilter.value);

    filteredEspers.forEach(esper => {
      const card = document.createElement("a");
      card.href = `personnage.html?id=${esper.id}`;
      card.className = `esper-card rarity-${esper.rarete.toLowerCase()}`;

      card.innerHTML = `
        <img src="portrait/${esper.id}.png" alt="${esper.nom}">
      `;

      grid.appendChild(card);
    });
  }

  fetch("data/characters_full.json")
    .then(response => response.json())
    .then(data => {
      allEspers = data.characters;
      renderEspers();
    });

  document.querySelectorAll(".filter-btn").forEach(button => {
    button.addEventListener("click", () => {
      document.querySelectorAll(".filter-btn").forEach(btn => btn.classList.remove("active"));
      button.classList.add("active");

      activeFilter = {
        type: button.dataset.filterType,
        value: button.dataset.filterValue
      };

      renderEspers();
    });
  });
</script>  

</body>
</html>
