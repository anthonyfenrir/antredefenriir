<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>NTEPedia - Guide FR Neverness to Everness</title>

  <link rel="stylesheet" href="style.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800&family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">

  <link rel="icon" type="image/png" href="annex/favicon.png">
  <link rel="shortcut icon" href="annex/favicon.png">
  <link rel="apple-touch-icon" href="annex/favicon.png">
</head>

<body>

  <section class="hero">
    <div class="container">
      <img
        src="annex/ntepedia-banner2.png"
        alt="NTEPedia - Guide FR Neverness to Everness"
        class="hero-banner"
      >
    </div>
  </section>

  <section class="quick-access">
    <div class="container">
      <div class="quick-grid">
        <a href="index.html" class="quick-card">Accueil</a>
        <a href="personnages.html" class="quick-card">Espers</a>
        <a href="guides.html" class="quick-card">Guides</a>            
      </div>
    </div>
  </section>

<section id="character-page" class="section">
  <div class="container">
    <div id="character-sheet"></div>
  </div>
</section>

<footer class="site-footer">
  <div class="container">
    <p>
      NTEPedia est un site communautaire non officiel dédié à Neverness to Everness.
      Neverness to Everness™, ses personnages, logos et ressources visuelles
      appartiennent à Perfect World Games et Hotta Studio.
    </p>
  </div>
</footer>

<script>
  const params = new URLSearchParams(window.location.search);
  const characterId = params.get("id");

  function valueOrDash(value) {
    return value && value.trim() !== "" ? value : "—";
  }

  function renderSkillCards(competences) {
    return Object.values(competences)
      .filter(skill => skill && (skill.nom || skill.description))
      .map(skill => `
        <div class="sheet-subcard">
          <h3>${valueOrDash(skill.nom)}</h3>
          <p>${valueOrDash(skill.description)}</p>
        </div>
      `)
      .join("");
  }

  function renderAwakening(eveil) {
    return eveil
      .map(item => `
        <div class="sheet-subcard">
          <h3>Rang ${item.rang} — ${item.titre}</h3>
          <p>${item.description}</p>
        </div>
      `)
      .join("");
  }

  function renderResonance(resonance) {
    return resonance
      .map(item => `
        <div class="sheet-subcard">
          <h3>${item.titre}</h3>
          <p>${item.description}</p>
        </div>
      `)
      .join("");
  }

  function renderStats(build) {
    const stats = build?.stats_prioritaires?.[0];

    if (!stats) {
      return "<p>Stats à venir.</p>";
    }

    return `
      <div class="sheet-subcard">
        <h3>Stats principales</h3>
        <p>${stats["Stats Principales"] || "—"}</p>
      </div>

      <div class="sheet-subcard">
        <h3>Stats secondaires</h3>
        <p>${stats["Stats Secondaires"] || "—"}</p>
      </div>
    `;
  }

  function renderTeams(teams) {
    const teamData = teams?.[0];

    if (!teamData) {
      return "<p>Équipes à venir.</p>";
    }

    return Object.entries(teamData)
      .map(([teamName, members]) => `
        <div class="sheet-subcard">
          <h3>${teamName}</h3>
          <p>${members}</p>
        </div>
      `)
      .join("");
  }

  fetch("data/characters_full.json")
    .then(response => response.json())
    .then(data => {
      const character = data.characters.find(char => char.id === characterId);
      const container = document.getElementById("character-sheet");

      if (!character) {
        container.innerHTML = "<p>Esper introuvable.</p>";
        return;
      }

      container.innerHTML = `
        <div class="sheet-layout">

          <section class="sheet-card sheet-main rarity-${character.rarete.toLowerCase()}">
            <div class="sheet-portrait">
              <img src="portrait/${character.id}.png" alt="${character.nom}">
            </div>

            <div class="sheet-main-info">
              <h1>${character.nom}</h1>
              <p class="character-en">
                Nom anglais : ${character.nom_en}
              </p>

              <div class="character-tags">
                <span>Rareté : ${character.rarete}</span>
                <span>Attribut : ${character.attribut}</span>
                <span>Rôle : ${character.role}</span>
                <span>Tier : ${character.tier_list}</span>
              </div>

              <p class="character-description">${character.description}</p>
            </div>
          </section>

          <section class="sheet-card">
            <h2>Armes & Console</h2>

            <div class="sheet-subcard">
              <h3>Arme principale</h3>
              <p>${valueOrDash(character.arme.type)} — ${valueOrDash(character.arme.nom)}</p>
            </div>

            <div class="sheet-subcard">
              <h3>Arme alternative</h3>
              <p>${valueOrDash(character.arme.type2)} — ${valueOrDash(character.arme.nom2)}</p>
            </div>

            <div class="sheet-subcard">
              <h3>Console principale</h3>
              <p>Cartouche : ${valueOrDash(character.console.cartouche)}</p>
              <p>Module : ${valueOrDash(character.console.module)}</p>
            </div>

            <div class="sheet-subcard">
              <h3>Console alternative</h3>
              <p>Cartouche : ${valueOrDash(character.console.cartouche2)}</p>
              <p>Module : ${valueOrDash(character.console.module2)}</p>
            </div>
          </section>

          <section class="sheet-card">
            <h2>Compétences</h2>
            ${renderSkillCards(character.competences)}
          </section>

          <section class="sheet-card">
            <h2>Éveil</h2>
            ${renderAwakening(character.eveil)}

            <h2 class="sheet-inner-title">Résonance</h2>
            ${renderResonance(character.resonance)}
          </section>

          <section class="sheet-card">
            <h2>Stats recommandées</h2>
            ${renderStats(character.build)}
          </section>

          <section class="sheet-card">
            <h2>Équipe(s) recommandée(s)</h2>
            ${renderTeams(character.team_recommandee)}
          </section>

        </div>
      `;
    })
    .catch(error => {
      console.error("Erreur fiche Esper :", error);
      document.getElementById("character-sheet").innerHTML =
        "<p>Erreur lors du chargement de la fiche.</p>";
    });
</script>
  
</body>
</html>
