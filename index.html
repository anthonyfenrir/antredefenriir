<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>L'Antre de FenriirCore</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #0c0c0c, #050505);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      width: 90%;
      max-width: 400px;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      opacity: 0.7;
      margin-bottom: 30px;
    }

    .link {
      display: block;
      margin: 12px 0;
      padding: 15px;
      border-radius: 12px;
      text-decoration: none;
      color: white;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(0, 255, 255, 0.2);
      transition: 0.3s;
    }

    .link:hover {
      background: rgba(0, 255, 255, 0.1);
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
      transform: scale(1.03);
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>FenriirCore</h1>
    <p>Entre dans mon univers</p>

    <a class="link" href="#">🎮 Twitch</a>
    <a class="link" href="#">🎵 TikTok</a>
    <a class="link" href="#">💬 Discord</a>
    <a class="link" href="#">🛍️ Youtube</a>
    
  </div>
</body>
</html>
